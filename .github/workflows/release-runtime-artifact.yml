name: Release Runtime Artifact

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-runtime:
    name: Build runtime (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Build runtime artifact
        run: ./scripts/build-runtime-artifact.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: foolery-runtime-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/foolery-runtime-*.tar.gz
            dist/foolery-runtime-*.tar.gz.sha256

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/foolery-runtime-*.tar.gz dist/foolery-runtime-*.tar.gz.sha256 --clobber
